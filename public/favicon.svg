<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- The app's mark. Keep in step with SparkleLogo in src/components/icons.tsx:
       the same five waveform bars, the same blue-to-cyan sweep as the input glow.
       userSpaceOnUse makes that gradient span all five bars as one surface —
       the default objectBoundingBox collapses on each zero-width vertical line,
       and every bar comes out flat. -->
  <defs>
    <linearGradient id="spark-g" gradientUnits="userSpaceOnUse" x1="0" y1="24" x2="24" y2="0">
      <stop offset="0%" stop-color="#0033ff" />
      <stop offset="55%" stop-color="#0091ff" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
  </defs>
  <g stroke="url(#spark-g)" stroke-width="2.6" stroke-linecap="round" fill="none">
    <path d="M3 9.5v5" />
    <path d="M7.5 6v12" />
    <path d="M12 2.8v18.4" />
    <path d="M16.5 6v12" />
    <path d="M21 9.5v5" />
  </g>
</svg>
